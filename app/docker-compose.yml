services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-mykayak}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      LANG: en_US.utf8
    ports:
      - "5432:5432"
    volumes:
      # Automatically run the translated setup.sql on the first initialization
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-mykayak}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Use the service name 'db' as the hostname
      DATABASE_URL: postgres://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-mykayak}
    depends_on:
      db:
        condition: service_healthy

  # Mirroring the worker service from the original project
  worker:
    build: .
    restart: always
    # You'll need to update your Rust binary to handle a "worker" mode 
    # or create a separate binary if this logic is distinct.
    command: ["./api", "--worker"] 
    environment:
      DATABASE_URL: postgres://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-mykayak}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
